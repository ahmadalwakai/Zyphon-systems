<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Z Mark -->
  <g>
    <!-- Outer frame -->
    <path d="M8 8 L40 8 L40 40 L8 40 Z" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Stylized Z mark -->
    <path d="M14 14 L34 14 L16 34 L34 34" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Circuit nodes -->
    <circle cx="14" cy="14" r="2" fill="#0d9488"/>
    <circle cx="34" cy="14" r="2" fill="#0d9488"/>
    <circle cx="16" cy="34" r="2" fill="#0d9488"/>
    <circle cx="34" cy="34" r="2" fill="#0d9488"/>
    
    <!-- Inner detail lines -->
    <path d="M8 24 L12 24 M36 24 L40 24 M24 8 L24 12 M24 36 L24 40" stroke="url(#logoGradient)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Text: ZYPHON -->
  <text x="52" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" letter-spacing="-0.02em" fill="white">Zyphon</text>

  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
</svg>
